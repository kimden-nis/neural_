<!DOCTYPE html>
<html>
<head>
<title>Ultimate Stack Visualizer</title>
<style>
body{
    text-align:center;
    font-family: Arial;
}

input, button{
    font-size:18px;
    padding:6px;
    margin:5px;
}

#stackContainer{
    margin:30px auto;
    width:120px;
    height:450px;
    border:2px solid black;
    display:flex;
    flex-direction: column-reverse;
    align-items:center;
    padding:5px;
    background:#f8f8f8;
}

.slot{
    width:100px;
    height:80px;
    border:2px solid black;
    margin:3px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
}

#topPointer{
    position:absolute;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:20px solid red;
}

.flying{
    width:100px;
    height:80px;
    color:white;
    font-size:22px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    position:absolute;
    transition: all 1s ease;
    z-index:1000;
}

#info{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<h2>Ultimate Stack Visualizer</h2>

<input id="value" placeholder="Enter value">
<button onclick="pushBtn()">Push</button>
<button onclick="popBtn()">Pop</button>
<button onclick="peek()">Peek</button>
<button onclick="autoDemo()">Auto Demo</button>

<br><br>

Speed:
<input type="range" id="speed" min="300" max="2000" value="1000">

<div id="stackContainer"></div>
<div id="topPointer"></div>

<div id="info"></div>

<script>

const MAX = 5
let stack = []
let container = document.getElementById("stackContainer")
let pointer = document.getElementById("topPointer")
let input = document.getElementById("value")
let info = document.getElementById("info")

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)) }

function getSpeed(){
    return document.getElementById("speed").value
}

function randomColor(){
    return `hsl(${Math.random()*360},70%,60%)`
}

function render(){
    container.innerHTML=""
    for(let i=0;i<stack.length;i++){
        let d=document.createElement("div")
        d.className="slot"
        d.innerText=stack[i].value
        d.style.background=stack[i].color
        container.appendChild(d)
    }

    info.innerText = "Stack Size: " + stack.length

    if(stack.length>0){
        let topEl = container.children[stack.length-1]
        let r = topEl.getBoundingClientRect()
        pointer.style.left = r.left + r.width/2 -10 + "px"
        pointer.style.top = r.top -25 + "px"
        pointer.style.display="block"
    } else {
        pointer.style.display="none"
    }
}

async function push(val){
    if(stack.length>=MAX){ alert("Full"); return }

    let color = randomColor()
    let block = document.createElement("div")
    block.className="flying"
    block.innerText=val
    block.style.background=color
    document.body.appendChild(block)

    let start = input.getBoundingClientRect()
    block.style.left=start.left+"px"
    block.style.top=start.top+"px"

    await sleep(50)

    let targetY = container.getBoundingClientRect().bottom - (stack.length+1)*86
    let targetX = container.getBoundingClientRect().left + 10

    block.style.transform=`translate(${targetX-start.left}px,${targetY-start.top}px)`

    await sleep(getSpeed())

    block.remove()
    stack.push({value:val,color:color})
    render()
}

async function pop(){
    if(stack.length===0){ alert("Empty"); return }

    let topEl = stack[stack.length-1]

    let block=document.createElement("div")
    block.className="flying"
    block.innerText=topEl.value
    block.style.background=topEl.color
    document.body.appendChild(block)

    let slot = container.children[stack.length-1]
    let r = slot.getBoundingClientRect()

    block.style.left=r.left+"px"
    block.style.top=r.top+"px"

    await sleep(50)

    block.style.transform="translate(0,-120px)"
    await sleep(getSpeed()/2)

    block.style.transform="translate(-200px,-120px)"
    block.style.background="red"
    await sleep(getSpeed()/2)

    block.remove()
    stack.pop()
    render()
}

function pushBtn(){
    let val=input.value
    input.value=""
    push(val)
}

function popBtn(){
    pop()
}

function peek(){
    if(stack.length===0){
        alert("Empty")
    } else {
        alert("Top element is: " + stack[stack.length-1].value)
    }
}

async function autoDemo(){
    await push(10)
    await push(20)
    await push(30)
    await sleep(500)
    await pop()
    await pop()
}

render()

</script>

</body>
</html>

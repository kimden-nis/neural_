<!DOCTYPE html>
<html>

<head>
<title>Queue Visualizer</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 30px;
}

input {
    padding: 6px;
    font-size: 18px;
}

button {
    padding: 8px 14px;
    font-size: 18px;
    margin-left: 5px;
}

#pointerRow {
    display: flex;
    justify-content: center;
    height: 30px;
    font-weight: bold;
    color: red;
}

.pointer {
    width: 106px;
}

#queue {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

.slot {
    width: 90px;
    height: 90px;
    border: 3px solid black;
    margin: 8px;
    position: relative;
    overflow: hidden;
}

.block {
    width: 90px;
    height: 90px;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 22px;
    border-radius: 8px;
    transition: transform 1s ease;
}

.flying {
    position: absolute;
    z-index: 1000;
}

#indexRow {
    display: flex;
    justify-content: center;
    margin-top: 5px;
    font-weight: bold;
}

.index {
    width: 106px;
}

#algoBox {
    width: 360px;
    margin: auto;
    margin-top: 30px;
    padding: 15px;
    border: 2px solid #444;
    border-radius: 10px;
    background: #f4f4f4;
    text-align: left;
    font-family: monospace;
}

.highlight {
    background: yellow;
    padding: 2px 4px;
    border-radius: 4px;
}
</style>
</head>

<body>

<h2>Queue Visualizer</h2>

<input id="value" placeholder="Enter value">
<button onclick="enqueue()">Enqueue</button>
<button onclick="dequeue()">Dequeue</button>

<div id="pointerRow"></div>
<div id="queue"></div>
<div id="indexRow"></div>

<div id="algoBox">
<h3>Algorithm</h3>

<div id="enqueueAlgo">
<b>ENQUEUE(x)</b><br>
<span id="e1">1. if queue is full</span><br>
<span id="e2">2. &nbsp;&nbsp;return "Overflow"</span><br>
<span id="e3">3. else</span><br>
<span id="e4">4. &nbsp;&nbsp;rear = rear + 1</span><br>
<span id="e5">5. &nbsp;&nbsp;queue[rear] = x</span>
</div>

<br>

<div id="dequeueAlgo">
<b>DEQUEUE()</b><br>
<span id="d1">1. if queue is empty</span><br>
<span id="d2">2. &nbsp;&nbsp;return "Underflow"</span><br>
<span id="d3">3. else</span><br>
<span id="d4">4. &nbsp;&nbsp;remove queue[front]</span><br>
<span id="d5">5. &nbsp;&nbsp;shift remaining elements</span>
</div>
</div>

<script>
const MAX = 6
let queue = []
let blocks = []

const queueDiv = document.getElementById("queue")
const pointerRow = document.getElementById("pointerRow")
const indexRow = document.getElementById("indexRow")
const inputBox = document.getElementById("value")

// create slots, pointers, and indexes
for (let i = 0; i < MAX; i++) {
    let pointer = document.createElement("div")
    pointer.className = "pointer"
    pointerRow.appendChild(pointer)

    let slot = document.createElement("div")
    slot.className = "slot"
    queueDiv.appendChild(slot)

    let index = document.createElement("div")
    index.className = "index"
    index.innerText = i
    indexRow.appendChild(index)
}

// helper functions
function updatePointers() {
    for (let i = 0; i < MAX; i++) pointerRow.children[i].innerText = ""
    if (queue.length > 0) {
        pointerRow.children[0].innerText = "Front"
        pointerRow.children[queue.length - 1].innerText += " Rear"
    }
}

function randomColor() {
    let r = Math.floor(Math.random() * 200)
    let g = Math.floor(Math.random() * 200)
    let b = Math.floor(Math.random() * 200)
    return `rgb(${r},${g},${b})`
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms))
}

function clearHighlight() {
    document.querySelectorAll("#algoBox span").forEach(line => line.classList.remove("highlight"))
}

function highlight(id) {
    clearHighlight()
    document.getElementById(id).classList.add("highlight")
}

// ENQUEUE
async function enqueue() {
    let val = inputBox.value
    if (val === "") return

    highlight("e1")
    if (queue.length === MAX) {
        highlight("e2")
        alert("Queue Full")
        return
    }

    highlight("e3")
    await sleep(300)

    // flying block animation
    let flying = document.createElement("div")
    flying.className = "block flying"
    flying.innerText = val
    flying.style.background = randomColor()
    document.body.appendChild(flying)

    let start = inputBox.getBoundingClientRect()
    flying.style.top = start.top + "px"
    flying.style.left = start.left + "px"

    let targetSlot = queueDiv.children[queue.length]
    let target = targetSlot.getBoundingClientRect()

    await sleep(50)

    let dx = target.left - start.left
    let dy = target.top - start.top
    flying.style.transform = `translate(${dx}px,${dy}px)`

    await sleep(1000)
    document.body.removeChild(flying)

    highlight("e4")
    await sleep(300)
    highlight("e5")
    await sleep(300)

    let block = document.createElement("div")
    block.className = "block"
    block.innerText = val
    block.style.background = randomColor()
    targetSlot.appendChild(block)

    queue.push(val)
    blocks.push(block)
    updatePointers()
    clearHighlight()
}

// DEQUEUE
async function dequeue() {
    highlight("d1")
    if (queue.length === 0) {
        highlight("d2")
        alert("Queue Empty")
        return
    }

    highlight("d3")
    await sleep(300)
    highlight("d4")

    let firstBlock = blocks[0]
    firstBlock.style.transform = "translateY(-140px)"
    await sleep(1000)
    firstBlock.remove()
    queue.shift()
    blocks.shift()

    highlight("d5")
    // sequential move
    for (let i = 0; i < blocks.length; i++) {
        let block = blocks[i]
        let currentRect = block.parentElement.getBoundingClientRect()
        let nextSlot = queueDiv.children[i]
        let nextRect = nextSlot.getBoundingClientRect()
        let dx = nextRect.left - currentRect.left
        block.style.transform = `translateX(${dx}px)`
        await sleep(1000)
        block.style.transform = "translateX(0)"
        nextSlot.appendChild(block)
    }

    updatePointers()
    clearHighlight()
}
</script>

</body>
</html>
